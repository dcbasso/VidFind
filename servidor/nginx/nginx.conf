events {}

http {
    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # -------------------------------------------------------
    # omv.site.com.br → OpenMediaVault (movido para porta 8888)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name omv.site.com.br;

        location / {
            proxy_pass         http://127.0.0.1:8888;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # OMV usa WebSockets para algumas telas
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # -------------------------------------------------------
    # videos.site.com.br → Ad-Search (porta 8080)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name videos.site.com.br;

        # Tamanho de upload generoso (não necessário para busca,
        # mas evita 413 se o frontend evoluir)
        client_max_body_size 50m;

        location / {
            proxy_pass         http://127.0.0.1:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
